<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1923" />
    <title>World Cup Path - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1923;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }
      .container {
        max-width: 400px;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: rgba(255,255,255,0.05);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
      }
      h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
      p { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
      .btn {
        display: inline-block;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        padding: 12px 32px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">&#9917;</div>
      <h1>You're offline</h1>
      <p>Connect to the internet to get the latest World Cup data. Previously loaded content may still be available.</p>
      <a href="/" class="btn">Try again</a>
    </div>
  </body>
</html>
